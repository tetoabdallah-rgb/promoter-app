<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoter App Cloud</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <!-- Local Mode: No Firebase -->
    
    <style>
        /* style.css */
:root {
    --bg1: #0f172a;
    --bg2: #1e293b;
    --tx1: #f8fafc;
    --tx2: #cbd5e1;
    --am: #3b82f6; /* Blue Accent */
    --gn: #10b981; /* Green */
    --rd: #ef4444; /* Red */
    --glass-bg: rgba(30, 41, 59, 0.6);
    --glass-border: rgba(255, 255, 255, 0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

body {
    background-color: var(--bg1);
    color: var(--tx1);
    min-height: 100vh;
    overflow-x: hidden;
}

/* Background Animation */
.bg-animated {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    z-index: -1;
    background: linear-gradient(120deg, #0f172a, #1e1b4b, #0f172a);
    background-size: 200% 200%;
    animation: gradientBG 15s ease infinite;
}
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Glassmorphism Classes */
.glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.screen {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}
.hidden { display: none !important; }

/* Auth Box */
.auth-box { width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }

/* Inputs and Buttons */
.input-box {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.05);
    color: var(--tx1);
    font-size: 1rem;
    outline: none;
    transition: 0.3s;
}
.input-box:focus { border-color: var(--am); }

.btn {
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
    width: 100%;
}
.btn-primary { background: var(--am); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-danger { background: var(--rd); color: #fff; }

/* App Layout */
#app-screen {
    display: flex;
    flex-direction: row;
    justify-content: flex-start;
    align-items: stretch;
    padding: 20px;
    gap: 20px;
}

.sidebar {
    width: 250px;
    display: flex;
    flex-direction: column;
}

.user-profile {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--glass-border);
}
.user-profile .avatar { font-size: 2.5rem; }
.user-profile .info { display: flex; flex-direction: column; }
.badge { background: var(--am); padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; width: fit-content; margin-top: 5px; }

.nav-links { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.nav-links li {
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}
.nav-links li:hover, .nav-links li.active { background: rgba(255,255,255,0.1); border-right: 4px solid var(--am); }

.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.topbar { padding: 15px; }
.page-container {
    flex: 1;
    overflow-y: auto;
}

/* Grids and Forms */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }

.fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
.fg label { font-size: 0.9rem; color: var(--tx2); }

/* Table */
table { width: 100%; border-collapse: collapse; margin-top: 15px; }
th, td { padding: 12px; text-align: right; border-bottom: 1px solid var(--glass-border); }
th { color: var(--tx2); }

@media (max-width: 768px) {
    #app-screen { flex-direction: column; padding: 10px; }
    .sidebar { width: 100%; }
}

    </style>
</head>
<body>
    <div class="bg-animated"></div>
    <div id="toast-container"></div>
    
    <!-- Language Toggle -->
    <button id="btnLang" onclick="toggleLang()" style="position:fixed; top:20px; left:20px; z-index:9999; background:rgba(0,0,0,0.5); color:#fff; border:1px solid rgba(255,255,255,0.2); padding:8px 15px; border-radius:20px; cursor:pointer; backdrop-filter:blur(10px);">English</button>

    <!-- Auth Screen -->
    <div id="auth-screen" class="screen">
        <div class="glass-card auth-box">
            <h1 id="loginTitle" style="text-align:center; font-size: 2rem; margin-bottom: 20px;">👤 تسجيل الدخول</h1>
            <p id="loginSub" style="text-align:center; margin-bottom: 20px; color: var(--tx2);">تطبيق إدارة البروموتر والمبيعات السحابي</p>
            <input type="email" id="authEmail" class="input-box" placeholder="البريد الإلكتروني">
            <input type="password" id="authPass" class="input-box" placeholder="كلمة المرور">
            
            <div class="grid-2">
                <button id="btnLogin" class="btn btn-primary" onclick="login()">دخول</button>
                <button id="btnSignup" class="btn" style="background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--glass-border);" onclick="signup()">إنشاء حساب جديد</button>
            </div>
            
            <p id="authError" style="color: var(--danger); text-align: center; margin-top: 10px; font-weight:bold; background:rgba(255,0,0,0.1); padding:5px; border-radius:5px; display:none;"></p>
        </div>
    </div>

    <!-- Main Application Screen -->
    <div id="app-screen" class="screen hidden">
        <nav class="sidebar glass-card">
            <div class="user-profile">
                <div class="avatar">👤</div>
                <div class="info">
                    <strong id="uiName">User</strong>
                    <span id="uiRole" class="badge">Role</span>
                </div>
            </div>
            
            <ul id="navLinks" class="nav-links"></ul>
            <button class="btn btn-danger" onclick="logout()" style="margin-top:auto;">خروج 🚪</button>
        </nav>

        <main class="main-content">
            <header class="topbar glass-card">
                <h2 id="pageTitle">لوحة التحكم</h2>
            </header>
            <div id="pageContent" class="page-container"></div>
        </main>
    </div>

    <!-- Loader -->
    <div id="loader" class="screen" style="z-index: 9999; background: rgba(0,0,0,0.8);">
        <div class="spinner"></div>
    </div>

    <script>
        // js/app.js

// --- LocalDB Helper (No Firebase) ---
const LocalDB = {
    get: (collection) => JSON.parse(localStorage.getItem(collection) || '[]'),
    set: (collection, data) => localStorage.setItem(collection, JSON.stringify(data)),
    add: (collection, item) => {
        let data = LocalDB.get(collection);
        item.id = Date.now().toString() + Math.random().toString().substring(2);
        item.timestamp = new Date().toISOString();
        data.push(item);
        LocalDB.set(collection, data);
        return item;
    },
    getById: (collection, id) => LocalDB.get(collection).find(i => i.id === id)
};

// --- State Variables ---
let currentUser = null;
let userData = null;
let currentRole = null;
let currentLang = localStorage.getItem('appLang') || 'ar'; // default arabic

const ADMIN_EMAILS = ['tetoabdallah@gmail.com'];

// --- Translation Dictionary ---
const dict = {
    ar: {
        login_title: "👤 تسجيل الدخول (محلي بدون نت)",
        login_subtitle: "تطبيق إدارة البروموتر والمبيعات (LocalStorage)",
        email_ph: "البريد الإلكتروني",
        pass_ph: "كلمة المرور",
        login_btn: "دخول",
        signup_btn: "إنشاء حساب جديد",
        logout: "خروج 🚪",
        admin_dash: "📊 لوحة التحكم الشاملة",
        admin_sales: "💰 كل المبيعات",
        admin_users: "👥 إدارة البروموترز",
        admin_backup: "💾 النسخ الاحتياطي",
        prm_dash: "🏠 الرئيسية",
        prm_sales: "➕ إدخال مبيعات",
        prm_att: "⏱️ الحضور والانصراف",
        sale_code: "كود الصنف",
        sale_price: "السعر",
        sale_date: "التاريخ",
        sale_time: "الوقت",
        sale_desc: "الوصف / الملاحظات",
        save_sale: "حفظ المبيعات 💾",
        my_sales: "مبيعاتي الأخيرة",
        att_title: "تسجيل الحضور اليومي",
        att_sub: "الدوام مقسم إلى فترتين (نصف ساعة لكل فترة)",
        slot1: "تسجيل حضور (الفترة 1)",
        slot2: "تسجيل حضور (الفترة 2)",
        att_history: "سجل الحضور",
        company: "الشركة",
        branch: "الفرع",
        promoter: "البروموتر",
        export_excel: "تصدير إكسيل 📊",
        send_email: "إرسال تقرير بالإيميل 📧",
        backup_title: "النسخ الاحتياطي وقاعدة البيانات",
        sales_summary: "ملخص المبيعات (الشركات والفروع)"
    },
    en: {
        login_title: "👤 Login (Local Mode)",
        login_subtitle: "Promoter & Sales Management App",
        email_ph: "Email Address",
        pass_ph: "Password",
        login_btn: "Login",
        signup_btn: "Create Account",
        logout: "Logout 🚪",
        admin_dash: "📊 Dashboard",
        admin_sales: "💰 All Sales",
        admin_users: "👥 Promoters Management",
        admin_backup: "💾 Backup",
        prm_dash: "🏠 Home",
        prm_sales: "➕ Add Sales",
        prm_att: "⏱️ Attendance",
        sale_code: "Item Code",
        sale_price: "Price",
        sale_date: "Date",
        sale_time: "Time",
        sale_desc: "Description / Notes",
        save_sale: "Save Sale 💾",
        my_sales: "My Recent Sales",
        att_title: "Daily Attendance",
        att_sub: "Shift is divided into 2 slots (30 mins each)",
        slot1: "Mark Attendance (Slot 1)",
        slot2: "Mark Attendance (Slot 2)",
        att_history: "Attendance History",
        company: "Company",
        branch: "Branch",
        promoter: "Promoter",
        export_excel: "Export Excel 📊",
        send_email: "Email Report 📧",
        backup_title: "Database Backup",
        sales_summary: "Sales Summary (Companies & Branches)"
    }
};

function t(key) {
    return dict[currentLang][key] || key;
}

function toggleLang() {
    currentLang = currentLang === 'ar' ? 'en' : 'ar';
    localStorage.setItem('appLang', currentLang);
    document.documentElement.lang = currentLang;
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    window.location.reload();
}

// --- Utility Functions ---
function $(id) { return document.getElementById(id); }
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    $(id).classList.remove('hidden');
}
function toast(msg, type='info') {
    let t_el = document.createElement('div');
    t_el.className = `glass-card`;
    t_el.style.cssText = `background: ${type==='error'?'var(--rd)':'var(--gn)'}; color: #fff; margin-bottom: 10px; padding: 10px; border-radius: 8px; font-weight: bold;`;
    t_el.innerText = msg;
    $('toast-container').appendChild(t_el);
    $('toast-container').style.cssText = `position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; flex-direction: column;`;
    setTimeout(() => t_el.remove(), 3000);
}

// --- Initialization ---
document.addEventListener('DOMContentLoaded', () => {
    document.documentElement.lang = currentLang;
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    
    // Apply initial translations
    $('loginTitle').innerText = t('login_title');
    $('loginSub').innerText = t('login_subtitle');
    $('authEmail').placeholder = t('email_ph');
    $('authPass').placeholder = t('pass_ph');
    $('btnLogin').innerText = t('login_btn');
    $('btnSignup').innerText = t('signup_btn');
    $('btnLang').innerText = currentLang === 'ar' ? 'English' : 'عربي';
    
    checkAuth();
});

function checkAuth() {
    let storedUser = localStorage.getItem('currentUser');
    if (storedUser) {
        currentUser = JSON.parse(storedUser);
        $('uiName').innerText = currentUser.email.split('@')[0];
        
        let users = LocalDB.get('users');
        userData = users.find(u => u.uid === currentUser.uid);
        
        if (userData) {
            currentRole = userData.role;
        } else {
            currentRole = ADMIN_EMAILS.includes(currentUser.email.toLowerCase()) ? 'admin' : 'promoter';
            userData = {
                uid: currentUser.uid,
                email: currentUser.email,
                role: currentRole,
                promoterCode: currentRole === 'promoter' ? 'PRM-' + Math.floor(Math.random()*10000) : 'ADMIN',
                branch: 'Main Branch',
                company: 'Main Company'
            };
            users.push(userData);
            LocalDB.set('users', users);
        }
        
        $('uiRole').innerText = currentRole === 'admin' ? (currentLang==='ar'?'مدير الإدارة 👑':'Admin 👑') : (currentLang==='ar'?'بروموتر 👤':'Promoter 👤');
        buildNav();
        showScreen('app-screen');
    } else {
        currentUser = null;
        userData = null;
        currentRole = null;
        showScreen('auth-screen');
    }
    $('loader').classList.add('hidden');
}

// --- Auth ---
function login() {
    let e = $('authEmail').value.trim();
    let p = $('authPass').value.trim();
    if (!e || !p) return toast('يرجى إدخال البريد وكلمة المرور', 'error');
    
    $('loader').classList.remove('hidden');
    setTimeout(() => {
        let authUsers = LocalDB.get('auth_users');
        let user = authUsers.find(u => u.email.toLowerCase() === e.toLowerCase() && u.password === p);
        
        if (user) {
            localStorage.setItem('currentUser', JSON.stringify({uid: user.uid, email: user.email}));
            $('authError').innerText = '';
            checkAuth();
        } else {
            $('loader').classList.add('hidden');
            let msg = currentLang === 'ar' ? 'البريد أو كلمة المرور غير صحيحة.' : 'Invalid email or password.';
            $('authError').innerText = msg;
            toast(msg, 'error');
        }
    }, 500);
}

function signup() {
    let e = $('authEmail').value.trim();
    let p = $('authPass').value.trim();
    if (!e || !p) return toast('يرجى إدخال البريد وكلمة المرور', 'error');
    
    $('loader').classList.remove('hidden');
    setTimeout(() => {
        let authUsers = LocalDB.get('auth_users');
        if (authUsers.find(u => u.email.toLowerCase() === e.toLowerCase())) {
            $('loader').classList.add('hidden');
            let msg = currentLang === 'ar' ? 'هذا البريد مسجل بالفعل.' : 'Email already registered.';
            $('authError').innerText = msg;
            return toast(msg, 'error');
        }
        
        let uid = 'usr_' + Date.now();
        authUsers.push({uid: uid, email: e, password: p});
        LocalDB.set('auth_users', authUsers);
        
        localStorage.setItem('currentUser', JSON.stringify({uid: uid, email: e}));
        $('authError').innerText = '';
        checkAuth();
    }, 500);
}

function logout() {
    localStorage.removeItem('currentUser');
    checkAuth();
}

// --- Navigation ---
function buildNav() {
    let links = '';
    if (currentRole === 'admin') {
        links += `<li onclick="nav('admin_dash')">${t('admin_dash')}</li>`;
        links += `<li onclick="nav('admin_sales')">${t('admin_sales')}</li>`;
        links += `<li onclick="nav('admin_backup')">${t('admin_backup')}</li>`;
    } else {
        links += `<li onclick="nav('promoter_dash')">${t('prm_dash')}</li>`;
        links += `<li onclick="nav('promoter_sales')">${t('prm_sales')}</li>`;
        links += `<li onclick="nav('promoter_attendance')">${t('prm_att')}</li>`;
    }
    $('navLinks').innerHTML = links;
    
    setTimeout(() => {
        let lis = $('navLinks').querySelectorAll('li');
        if(lis.length > 0) lis[0].click();
    }, 100);
}

function nav(page) {
    let lis = $('navLinks').querySelectorAll('li');
    lis.forEach(li => li.classList.remove('active'));
    let e = window.event;
    if(e && e.target && e.target.tagName === 'LI') e.target.classList.add('active');
    
    let content = '';
    let title = '';
    
    if (page === 'promoter_sales') {
        title = t('prm_sales');
        content = `
            <div class="glass-card">
                <div class="grid-2">
                    <div class="fg">
                        <label>${t('sale_code')}</label>
                        <input type="text" id="sCode" class="input-box" placeholder="ITEM-123">
                    </div>
                    <div class="fg">
                        <label>${t('sale_price')}</label>
                        <input type="number" id="sPrice" class="input-box" placeholder="0">
                    </div>
                    <div class="fg">
                        <label>${t('sale_date')}</label>
                        <input type="date" id="sDate" class="input-box" value="${new Date().toISOString().split('T')[0]}">
                    </div>
                    <div class="fg">
                        <label>${t('sale_time')}</label>
                        <input type="time" id="sTime" class="input-box" value="${new Date().toTimeString().split(' ')[0].substring(0,5)}">
                    </div>
                </div>
                <div class="fg">
                    <label>${t('sale_desc')}</label>
                    <input type="text" id="sDesc" class="input-box" placeholder="...">
                </div>
                <button class="btn btn-primary" onclick="submitSale()">${t('save_sale')}</button>
            </div>
            <h3 style="margin-top:20px;">${t('my_sales')}</h3>
            <div class="glass-card" style="margin-top:10px; overflow-x:auto;">
                <table id="mySalesTable">
                    <tr><th>${t('sale_code')}</th><th>${t('sale_desc')}</th><th>${t('sale_price')}</th><th>${t('sale_date')}</th></tr>
                </table>
            </div>
        `;
        setTimeout(loadMySales, 100);
    }
    else if (page === 'promoter_attendance') {
        title = t('prm_att');
        content = `
            <div class="glass-card" style="text-align:center;">
                <h3>${t('att_title')}</h3>
                <p style="color:var(--tx2); margin-bottom:15px;">${t('att_sub')}</p>
                <div class="grid-2" style="max-width:400px; margin:auto;">
                    <button id="btnAtt1" class="btn btn-primary" onclick="markAttendance(1)">${t('slot1')}</button>
                    <button id="btnAtt2" class="btn btn-primary" onclick="markAttendance(2)">${t('slot2')}</button>
                </div>
            </div>
            <div class="glass-card" style="margin-top:20px;">
                <h3>${t('att_history')}</h3>
                <table id="myAttTable">
                    <tr><th>${t('sale_date')}</th><th>Slot 1</th><th>Slot 2</th></tr>
                </table>
            </div>
        `;
        setTimeout(loadMyAttendance, 100);
    }
    else if (page === 'admin_sales') {
        title = t('admin_sales');
        content = `
            <div class="glass-card" style="margin-bottom:15px; display:flex; gap:10px;">
                <button class="btn btn-primary" onclick="exportExcel()">${t('export_excel')}</button>
                <button class="btn btn-primary" onclick="emailReport()">${t('send_email')}</button>
            </div>
            <div class="glass-card" style="overflow-x:auto;">
                <table id="allSalesTable">
                    <tr><th>${t('company')}</th><th>${t('branch')}</th><th>${t('promoter')}</th><th>${t('sale_code')}</th><th>${t('sale_price')}</th><th>${t('sale_date')}</th></tr>
                </table>
            </div>
        `;
        setTimeout(loadAllSales, 100);
    }
    else if (page === 'admin_dash') {
        title = t('sales_summary');
        content = `
            <div class="grid-2">
                <div class="glass-card">
                    <h3>المبيعات حسب الشركة (Company Sales)</h3>
                    <ul id="companySalesList" style="margin-top:10px; padding:0; list-style:none;"></ul>
                </div>
                <div class="glass-card">
                    <h3>المبيعات حسب الفرع (Branch Sales)</h3>
                    <ul id="branchSalesList" style="margin-top:10px; padding:0; list-style:none;"></ul>
                </div>
            </div>
        `;
        setTimeout(loadDashboard, 100);
    }
    else if (page === 'admin_backup') {
        title = t('admin_backup');
        content = `
            <div class="glass-card" style="text-align:center;">
                <h3>${t('backup_title')}</h3>
                <p style="color:var(--tx2); margin: 15px 0;">يمكنك سحب نسخة احتياطية من كل مبيعات التطبيق لضمان حفظ البيانات على الكمبيوتر.</p>
                <button class="btn btn-primary" style="max-width:300px; margin:auto;" onclick="exportExcel()">${t('export_excel')}</button>
            </div>
        `;
    }
    else {
        title = t('prm_dash');
        content = `<div class="glass-card"><p>Welcome / أهلاً بك</p></div>`;
    }
    
    $('pageTitle').innerText = title;
    $('pageContent').innerHTML = content;
}

// --- Promoter Features ---
function submitSale() {
    let c = $('sCode').value.trim();
    let p = $('sPrice').value.trim();
    let d = $('sDate').value;
    let t_str = $('sTime').value;
    let desc = $('sDesc').value.trim();
    
    if(!c || !p) return toast('إدخال الكود والسعر إلزامي', 'error');
    
    $('loader').classList.remove('hidden');
    setTimeout(() => {
        try {
            LocalDB.add('sales', {
                uid: currentUser.uid,
                promoterCode: userData.promoterCode,
                branch: userData.branch,
                company: userData.company,
                itemCode: c,
                price: Number(p),
                date: d,
                time: t_str,
                description: desc
            });
            toast('تم الحفظ بنجاح', 'success');
            $('sCode').value = ''; $('sPrice').value = ''; $('sDesc').value = '';
            loadMySales();
        } catch(err) {
            toast(err.message, 'error');
        }
        $('loader').classList.add('hidden');
    }, 300);
}

function loadMySales() {
    let tb = $('mySalesTable');
    if(!tb) return;
    tb.innerHTML = `<tr><th>${t('sale_code')}</th><th>${t('sale_desc')}</th><th>${t('sale_price')}</th><th>${t('sale_date')}</th></tr>`;
    
    let sales = LocalDB.get('sales')
        .filter(s => s.uid === currentUser.uid)
        .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))
        .slice(0, 20);
        
    sales.forEach(d => {
        tb.innerHTML += `<tr><td>${d.itemCode}</td><td>${d.description}</td><td>${d.price}</td><td>${d.date} ${d.time}</td></tr>`;
    });
}

function markAttendance(slot) {
    let d = new Date().toISOString().split('T')[0];
    let docId = currentUser.uid + "_" + d;
    
    $('loader').classList.remove('hidden');
    setTimeout(() => {
        try {
            let att = LocalDB.get('attendance');
            let data = att.find(a => a.id === docId);
            
            if (!data) {
                data = { id: docId, uid: currentUser.uid, date: d, slot1: false, slot2: false, timestamp: new Date().toISOString() };
                att.push(data);
            }
            
            if (slot === 1) data.slot1 = true;
            if (slot === 2) data.slot2 = true;
            
            LocalDB.set('attendance', att);
            toast('تم تسجيل الحضور', 'success');
            loadMyAttendance();
        } catch(err) {
            toast(err.message, 'error');
        }
        $('loader').classList.add('hidden');
    }, 300);
}

function loadMyAttendance() {
    let tb = $('myAttTable');
    if(!tb) return;
    
    let att = LocalDB.get('attendance')
        .filter(a => a.uid === currentUser.uid)
        .sort((a,b) => new Date(b.date) - new Date(a.date))
        .slice(0, 10);
        
    tb.innerHTML = `<tr><th>${t('sale_date')}</th><th>Slot 1</th><th>Slot 2</th></tr>`;
    let today = new Date().toISOString().split('T')[0];
    
    att.forEach(d => {
        let s1 = d.slot1 ? '✅' : '❌';
        let s2 = d.slot2 ? '✅' : '❌';
        tb.innerHTML += `<tr><td>${d.date}</td><td>${s1}</td><td>${s2}</td></tr>`;
        
        if(d.date === today) {
            if(d.slot1) { $('btnAtt1').disabled = true; $('btnAtt1').innerText = 'تم ✔️'; $('btnAtt1').style.background = 'var(--gn)'; }
            if(d.slot2) { $('btnAtt2').disabled = true; $('btnAtt2').innerText = 'تم ✔️'; $('btnAtt2').style.background = 'var(--gn)'; }
        }
    });
}

// --- Admin Features ---
function loadAllSales() {
    let tb = $('allSalesTable');
    if(!tb) return;
    
    let sales = LocalDB.get('sales')
        .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))
        .slice(0, 100);
        
    tb.innerHTML = `<tr><th>${t('company')}</th><th>${t('branch')}</th><th>${t('promoter')}</th><th>${t('sale_code')}</th><th>${t('sale_price')}</th><th>${t('sale_date')}</th></tr>`;
    sales.forEach(d => {
        tb.innerHTML += `<tr><td>${d.company}</td><td>${d.branch}</td><td>${d.promoterCode}</td><td>${d.itemCode}</td><td>${d.price}</td><td>${d.date} ${d.time}</td></tr>`;
    });
}

function loadDashboard() {
    let sales = LocalDB.get('sales');
    let compObj = {};
    let brObj = {};
    
    sales.forEach(d => {
        compObj[d.company] = (compObj[d.company] || 0) + d.price;
        brObj[d.branch] = (brObj[d.branch] || 0) + d.price;
    });
    
    let cList = $('companySalesList');
    if(cList) {
        cList.innerHTML = '';
        for(let c in compObj) cList.innerHTML += `<li style="padding:10px; border-bottom:1px solid var(--glass-border); display:flex; justify-content:space-between;"><span>${c}</span> <strong>${compObj[c]}</strong></li>`;
    }
    
    let bList = $('branchSalesList');
    if(bList) {
        bList.innerHTML = '';
        for(let b in brObj) bList.innerHTML += `<li style="padding:10px; border-bottom:1px solid var(--glass-border); display:flex; justify-content:space-between;"><span>${b}</span> <strong>${brObj[b]}</strong></li>`;
    }
}

function exportExcel() {
    if(typeof XLSX === 'undefined') {
        toast('المكتبة غير محملة بعد، حاول مرة أخرى.', 'error');
        return;
    }
    
    $('loader').classList.remove('hidden');
    setTimeout(() => {
        let sales = LocalDB.get('sales').sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
        let data = [];
        sales.forEach(d => {
            data.push({
                "Company": d.company,
                "Branch": d.branch,
                "Promoter Code": d.promoterCode,
                "Item Code": d.itemCode,
                "Description": d.description,
                "Price": d.price,
                "Date": d.date,
                "Time": d.time
            });
        });
        
        let ws = XLSX.utils.json_to_sheet(data);
        let wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Sales");
        XLSX.writeFile(wb, "Promoter_Sales_Backup_" + new Date().toISOString().split('T')[0] + ".xlsx");
        $('loader').classList.add('hidden');
    }, 500);
}

function emailReport() {
    let sales = LocalDB.get('sales').sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).slice(0, 50);
    let body = "Sales Report Summary:\n\n";
    let total = 0;
    
    sales.forEach(d => {
        body += `- [${d.company}] ${d.branch} | Promoter: ${d.promoterCode} | Item: ${d.itemCode} | Price: ${d.price} | Date: ${d.date}\n`;
        total += d.price;
    });
    body += `\nTotal Sales Value: ${total}\n`;
    
    let mailtoLink = `mailto:${ADMIN_EMAILS[0]}?subject=Promoter App Sales Report&body=${encodeURIComponent(body)}`;
    window.location.href = mailtoLink;
}
