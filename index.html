        /* style.css */
:root {
    --bg1: #0f172a;
    --bg2: #1e293b;
    --tx1: #f8fafc;
    --tx2: #cbd5e1;
    --am: #3b82f6; /* Blue Accent */
    --gn: #10b981; /* Green */
    --rd: #ef4444; /* Red */
    --glass-bg: rgba(30, 41, 59, 0.6);
    --glass-border: rgba(255, 255, 255, 0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

body {
    background-color: var(--bg1);
    color: var(--tx1);
    min-height: 100vh;
    overflow-x: hidden;
}

/* Background Animation */
.bg-animated {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    z-index: -1;
    background: linear-gradient(120deg, #0f172a, #1e1b4b, #0f172a);
    background-size: 200% 200%;
    animation: gradientBG 15s ease infinite;
}
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Glassmorphism Classes */
.glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.screen {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}
.hidden { display: none !important; }

/* Auth Box */
.auth-box { width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }

/* Inputs and Buttons */
.input-box {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.05);
    color: var(--tx1);
    font-size: 1rem;
    outline: none;
    transition: 0.3s;
}
.input-box:focus { border-color: var(--am); }

.btn {
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
    width: 100%;
}
.btn-primary { background: var(--am); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-danger { background: var(--rd); color: #fff; }

/* App Layout */
#app-screen {
    display: flex;
    flex-direction: row;
    justify-content: flex-start;
    align-items: stretch;
    padding: 20px;
    gap: 20px;
}

.sidebar {
    width: 250px;
    display: flex;
    flex-direction: column;
}

.user-profile {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--glass-border);
}
.user-profile .avatar { font-size: 2.5rem; }
.user-profile .info { display: flex; flex-direction: column; }
.badge { background: var(--am); padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; width: fit-content; margin-top: 5px; }

.nav-links { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.nav-links li {
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}
.nav-links li:hover, .nav-links li.active { background: rgba(255,255,255,0.1); border-right: 4px solid var(--am); }

.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.topbar { padding: 15px; }
.page-container {
    flex: 1;
    overflow-y: auto;
}

/* Grids and Forms */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }

.fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
.fg label { font-size: 0.9rem; color: var(--tx2); }

/* Table */
table { width: 100%; border-collapse: collapse; margin-top: 15px; }
th, td { padding: 12px; text-align: right; border-bottom: 1px solid var(--glass-border); }
th { color: var(--tx2); }

@media (max-width: 768px) {
    #app-screen { flex-direction: column; padding: 10px; }
    .sidebar { width: 100%; }
}

    </style>

// --- LocalDB Helper (No Firebase) ---
const LocalDB = {
    get: (collection) => JSON.parse(localStorage.getItem(collection) || '[]'),
    set: (collection, data) => localStorage.setItem(collection, JSON.stringify(data)),
    add: (collection, item) => {
        let data = LocalDB.get(collection);
        item.id = Date.now().toString() + Math.random().toString().substring(2);
        item.timestamp = new Date().toISOString();
        data.push(item);
        LocalDB.set(collection, data);
        return item;
    },
    getById: (collection, id) => LocalDB.get(collection).find(i => i.id === id),
    deleteById: (collection, id) => {
        let data = LocalDB.get(collection);
        data = data.filter(i => i.id !== id);
        LocalDB.set(collection, data);
    }
};

let currentRole = null;
let currentLang = localStorage.getItem('appLang') || 'ar'; // default arabic

const ADMIN_EMAILS = ['tetoabdallah@gmail.com'];

function t(key) {
    return dict[currentLang][key] || key;
}

function toggleLang() {
    currentLang = currentLang === 'ar' ? 'en' : 'ar';
    localStorage.setItem('appLang', currentLang);
    document.documentElement.lang = currentLang;
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    window.location.reload();
}

// --- Utility Functions ---
function $(id) { return document.getElementById(id); }
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    $(id).classList.remove('hidden');
}
function toast(msg, type='info') {
    let t_el = document.createElement('div');
    t_el.className = `glass-card`;
    t_el.style.cssText = `background: ${type==='error'?'var(--rd)':'var(--gn)'}; color: #fff; margin-bottom: 10px; padding: 10px; border-radius: 8px; font-weight: bold;`;
    t_el.innerText = msg;
    $('toast-container').appendChild(t_el);
    $('toast-container').style.cssText = `position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; flex-direction: column;`;
    setTimeout(() => t_el.remove(), 3000);
}

// --- Initialization ---
document.addEventListener('DOMContentLoaded', () => {
    document.documentElement.lang = currentLang;
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    
    // Seed admin if not exists
    let authUsers = LocalDB.get('auth_users');
    let adminEmail = 'tetoabdallah@gmail.com';
    if (!authUsers.find(u => u.email.toLowerCase() === adminEmail)) {
        authUsers.push({uid: 'admin_root', email: adminEmail, password: 'admin'});
        LocalDB.set('auth_users', authUsers);
        
        let users = LocalDB.get('users');
        if (!users.find(u => u.email.toLowerCase() === adminEmail)) {
            users.push({
                uid: 'admin_root',
                email: adminEmail,
                role: 'admin',
                promoterCode: 'ADMIN',
                branch: 'Main Branch',
                company: 'Main Company'
            });
            LocalDB.set('users', users);
        }
    }

    // Apply initial translations
    $('loginTitle').innerText = t('login_title');
    $('loginSub').innerText = t('login_subtitle');
    $('authEmail').placeholder = t('email_ph');
    $('authPass').placeholder = t('pass_ph');
    $('btnLogin').innerText = t('login_btn');
    $('btnLang').innerText = currentLang === 'ar' ? 'English' : 'عربي';
    
    checkAuth();
});

function checkAuth() {
    let storedUser = localStorage.getItem('currentUser');
    if (storedUser) {
        currentUser = JSON.parse(storedUser);
        $('uiName').innerText = currentUser.email.split('@')[0];
        
        let users = LocalDB.get('users');
        userData = users.find(u => u.uid === currentUser.uid);
        
        if (userData) {
            currentRole = userData.role;
        } else {
            currentRole = ADMIN_EMAILS.includes(currentUser.email.toLowerCase()) ? 'admin' : 'promoter';
            userData = {
                uid: currentUser.uid,
                email: currentUser.email,
                role: currentRole,
                promoterCode: currentRole === 'promoter' ? 'PRM-' + Math.floor(Math.random()*10000) : 'ADMIN',
                branch: 'Main Branch',
                company: 'Main Company'
            };
            users.push(userData);
            LocalDB.set('users', users);
        }
        
        $('uiRole').innerText = currentRole === 'admin' ? (currentLang==='ar'?'مدير الإدارة 👑':'Admin 👑') : (currentLang==='ar'?'بروموتر 👤':'Promoter 👤');
        buildNav();
        showScreen('app-screen');
    } else {
        currentUser = null;
        userData = null;
        currentRole = null;
        showScreen('auth-screen');
    }
    $('loader').classList.add('hidden');
}

// --- Auth ---
let loginMode = 'promoter';

function switchLogin(mode) {
    loginMode = mode;
    if(mode === 'promoter') {
        $('tabPromoter').style.background = 'var(--am)';
        $('tabAdmin').style.background = 'rgba(255,255,255,0.1)';
        $('loginTitle').innerText = currentLang === 'ar' ? '👤 دخول البروموتر' : '👤 Promoter Login';
    } else {
        $('tabAdmin').style.background = 'var(--am)';
        $('tabPromoter').style.background = 'rgba(255,255,255,0.1)';
        $('loginTitle').innerText = currentLang === 'ar' ? '👑 دخول الإدارة' : '👑 Admin Login';
    }
}

function login() {
    let e = $('authEmail').value.trim();
    let p = $('authPass').value.trim();
    if (!e || !p) return toast('يرجى إدخال البريد وكلمة المرور', 'error');
    
    $('loader').classList.remove('hidden');
    setTimeout(() => {
        let authUsers = LocalDB.get('auth_users');
        let user = authUsers.find(u => u.email.toLowerCase() === e.toLowerCase() && u.password === p);
        
        if (user) {
            let profile = LocalDB.get('users').find(x => x.uid === user.uid);
            let isAdmin = (profile && profile.role === 'admin') || ADMIN_EMAILS.includes(e.toLowerCase());
            
            if (loginMode === 'admin' && !isAdmin) {
                $('loader').classList.add('hidden');
                let msg = currentLang === 'ar' ? 'غير مصرح لك بالدخول من واجهة الإدارة.' : 'Not authorized for Admin portal.';
                $('authError').innerText = msg;
                $('authError').style.display = 'block';
                return toast(msg, 'error');
            }
            if (loginMode === 'promoter' && isAdmin) {
                $('loader').classList.add('hidden');
                let msg = currentLang === 'ar' ? 'يرجى الدخول من واجهة الإدارة الخاصة بك.' : 'Please use the Admin login tab.';
                $('authError').innerText = msg;
                $('authError').style.display = 'block';
                return toast(msg, 'error');
            }

            localStorage.setItem('currentUser', JSON.stringify({uid: user.uid, email: user.email}));
            $('authError').innerText = '';
            $('authError').style.display = 'none';
            checkAuth();
        } else {
            $('loader').classList.add('hidden');
            let msg = currentLang === 'ar' ? 'البريد أو كلمة المرور غير صحيحة.' : 'Invalid email or password.';
            $('authError').innerText = msg;
            toast(msg, 'error');
        }
    }, 500);
}

function logout() {
    localStorage.removeItem('currentUser');
    checkAuth();
}

// --- Navigation ---
function buildNav() {
    let links = '';
    if (currentRole === 'admin') {
        links += `<li onclick="nav('admin_dash')">${t('admin_dash')}</li>`;
        links += `<li onclick="nav('admin_sales')">${t('admin_sales')}</li>`;
        links += `<li onclick="nav('admin_users')">${t('admin_users')}</li>`;
        links += `<li onclick="nav('admin_products')">${t('admin_products')}</li>`;
        links += `<li onclick="nav('admin_backup')">${t('admin_backup')}</li>`;
    } else {
        links += `<li onclick="nav('promoter_dash')">${t('prm_dash')}</li>`;
        links += `<li onclick="nav('promoter_sales')">${t('prm_sales')}</li>`;
        links += `<li onclick="nav('promoter_attendance')">${t('prm_att')}</li>`;
    }
    $('navLinks').innerHTML = links;
    
    setTimeout(() => {
        let lis = $('navLinks').querySelectorAll('li');
        if(lis.length > 0) lis[0].click();
    }, 100);
}

        `;
        setTimeout(initPromoterSales, 100);

                    <button id="btnAtt2" class="btn btn-primary" onclick="markAttendance(2)">${t('slot2')}</button>
                </div>
            </div>
            <div class="glass-card" style="margin-top:20px;">

function markAttendance(slot) {
    let d = new Date().toISOString().split('T')[0];
    let docId = currentUser.uid + "_" + d;
    
    $('loader').classList.remove('hidden');
    setTimeout(() => {
        try {
            let att = LocalDB.get('attendance');
            let data = att.find(a => a.id === docId);
            
            if (!data) {
                data = { id: docId, uid: currentUser.uid, date: d, slot1: false, slot2: false, timestamp: new Date().toISOString() };
                att.push(data);
            }
            
            if (slot === 1) data.slot1 = true;
            if (slot === 2) data.slot2 = true;
            
            LocalDB.set('attendance', att);
            toast('تم تسجيل الحضور', 'success');
            loadMyAttendance();
        } catch(err) {
            toast(err.message, 'error');
        }
        $('loader').classList.add('hidden');
    }, 300);
}

function loadMyAttendance() {
    let tb = $('myAttTable');
    if(!tb) return;
    
    let att = LocalDB.get('attendance')
        .filter(a => a.uid === currentUser.uid)
        .sort((a,b) => new Date(b.date) - new Date(a.date))
        .slice(0, 10);
        
    tb.innerHTML = `<tr><th>${t('sale_date')}</th><th>Slot 1</th><th>Slot 2</th></tr>`;
    let today = new Date().toISOString().split('T')[0];
    
    att.forEach(d => {
        let s1 = d.slot1 ? '✅' : '❌';
        let s2 = d.slot2 ? '✅' : '❌';
        tb.innerHTML += `<tr><td>${d.date}</td><td>${s1}</td><td>${s2}</td></tr>`;
        
        if(d.date === today) {
            if(d.slot1) { $('btnAtt1').disabled = true; $('btnAtt1').innerText = 'تم ✔️'; $('btnAtt1').style.background = 'var(--gn)'; }
            if(d.slot2) { $('btnAtt2').disabled = true; $('btnAtt2').innerText = 'تم ✔️'; $('btnAtt2').style.background = 'var(--gn)'; }
        }
    });
}

function loadDashboard() {

    sales.forEach(d => {
        compObj[d.company] = (compObj[d.company] || 0) + d.price;

    });

function adminAddUser() {

function adminUpdateUser() {
    let e = $('nuEmail').value.trim();
    let p = $('nuPass').value.trim();
    let comp = $('nuCompany').value.trim();
    let br = $('nuBranch').value.trim();
    let code = $('nuCode').value.trim();
    let r = $('nuRole').value;
    
    if(!e || !p) return toast('يرجى تعبئة البريد وكلمة المرور', 'error');
    if(r === 'promoter' && (!comp || !br || !code)) return toast('يرجى تعبئة بيانات الشركة للبروموتر', 'error');
    
    let authUsers = LocalDB.get('auth_users');
    let auIndex = authUsers.findIndex(u => u.uid === editingUserUid);
    
    let existingAuth = authUsers.find(u => u.email.toLowerCase() === e.toLowerCase() && u.uid !== editingUserUid);
    if(existingAuth) return toast(currentLang === 'ar' ? 'هذا البريد مسجل لمستخدم آخر' : 'Email used by another user', 'error');
    
    if(auIndex > -1) {
        authUsers[auIndex].email = e;
        authUsers[auIndex].password = p;
        LocalDB.set('auth_users', authUsers);
    }
    
    let users = LocalDB.get('users');
    let uIndex = users.findIndex(u => u.uid === editingUserUid);
    if(uIndex > -1) {
        users[uIndex].email = e;
        users[uIndex].role = r;
        users[uIndex].company = comp;
        users[uIndex].branch = br;
        users[uIndex].promoterCode = code;
        LocalDB.set('users', users);
    }
    
    toast(currentLang === 'ar' ? 'تم التعديل بنجاح' : 'Updated successfully', 'success');
    cancelEditUser();
    loadAdminUsers();
}

    let users = LocalDB.get('users').filter(u => u.uid !== uid);
    LocalDB.set('users', users);
    
    toast('تم الحذف', 'success');
    loadAdminUsers();
}

function uploadProductsExcel() {
    let comp = $('prodCompany').value.trim();
    let fileInput = $('prodFile');
    
    if(!comp) return toast('يرجى إدخال اسم الشركة', 'error');
    if(!fileInput.files.length) return toast('يرجى اختيار ملف إكسيل', 'error');
    
    if(typeof XLSX === 'undefined') return toast('المكتبة غير محملة بعد، يرجى المحاولة لاحقاً', 'error');
    
    $('loader').classList.remove('hidden');
    let file = fileInput.files[0];
    let reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            let data = new Uint8Array(e.target.result);
            let workbook = XLSX.read(data, {type: 'array'});
            let firstSheetName = workbook.SheetNames[0];
            let worksheet = workbook.Sheets[firstSheetName];
            
            // Convert to JSON array
            let json = XLSX.utils.sheet_to_json(worksheet, {header: 1});
            if(json.length < 2) throw new Error("الملف فارغ أو لا يحتوي على بيانات");
            
            let prods = LocalDB.get('products');
            let addedCount = 0;
            
            // Assuming order: Code, Description, Price
            for(let i = 1; i < json.length; i++) {
                let row = json[i];
                if(row.length >= 3 && row[0]) {
                    prods.push({
                        id: Date.now().toString() + Math.random().toString().substring(2),
                        company: comp,
                        itemCode: String(row[0]).trim(),
                        description: String(row[1]).trim(),
                        price: Number(row[2]) || 0,
                        timestamp: new Date().toISOString()
                    });
                    addedCount++;
                }
            }
            LocalDB.set('products', prods);
            toast(`تم رفع ${addedCount} منتج بنجاح لشركة ${comp}`, 'success');
            $('prodCompany').value = '';
            fileInput.value = '';
            loadAdminProducts();
        } catch(err) {
            toast('حدث خطأ أثناء قراءة الملف: ' + err.message, 'error');
        }
        $('loader').classList.add('hidden');
    };
    reader.onerror = function() {
        toast('حدث خطأ في قراءة الملف', 'error');
        $('loader').classList.add('hidden');
    };
    reader.readAsArrayBuffer(file);
}

function deleteProduct(id) {
    if(!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;
    LocalDB.deleteById('products', id);
    toast('تم الحذف', 'success');
    loadAdminProducts();
}

function exportExcel() {
    if(typeof XLSX === 'undefined') {
        toast('المكتبة غير محملة بعد، حاول مرة أخرى.', 'error');
        return;
    }
    
    $('loader').classList.remove('hidden');
    setTimeout(() => {
        let sales = LocalDB.get('sales').sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
        let data = [];
        sales.forEach(d => {
            data.push({
                "Company": d.company,
                "Branch": d.branch,
                "Promoter Code": d.promoterCode,
                "Item Code": d.itemCode,
                "Description": d.description,
                "Price": d.price,
                "Date": d.date,
                "Time": d.time
            });
        });
        
        let ws = XLSX.utils.json_to_sheet(data);
        let wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Sales");
        XLSX.writeFile(wb, "Promoter_Sales_Backup_" + new Date().toISOString().split('T')[0] + ".xlsx");
        $('loader').classList.add('hidden');
    }, 500);
}

function emailReport() {
    let sales = LocalDB.get('sales').sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).slice(0, 50);
    let body = "Sales Report Summary:\n\n";
    let total = 0;
    
    sales.forEach(d => {
        body += `- [${d.company}] ${d.branch} | Promoter: ${d.promoterCode} | Item: ${d.itemCode} | Price: ${d.price} | Date: ${d.date}\n`;
        total += d.price;
    });
    body += `\nTotal Sales Value: ${total}\n`;
    
    let mailtoLink = `mailto:${ADMIN_EMAILS[0]}?subject=Promoter App Sales Report&body=${encodeURIComponent(body)}`;
    window.location.href = mailtoLink;
}

function resetApp() {
    if(confirm('هل أنت متأكد من رغبتك في حذف الحسابات والمبيعات بالكامل للبدء من جديد؟')) {
        localStorage.clear();
        window.location.reload();
    }
}
