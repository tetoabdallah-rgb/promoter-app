<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Promoter Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1f6feb">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3214/3214746.png">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Firebase SDKs (Compat for script tag usage) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="js/app.js" defer></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('SW registered!', reg);
                }).catch(err => console.log('SW registration failed', err));
            });
        }
    </script>
</head>
<body>
    <div class="bg-animated"></div>
    <div id="toast-container"></div>
    
    <!-- Language Toggle -->
    <button id="btnLang" onclick="toggleLang()" style="position:fixed; top:20px; left:20px; z-index:9999; background:rgba(0,0,0,0.5); color:#fff; border:1px solid rgba(255,255,255,0.2); padding:8px 15px; border-radius:20px; cursor:pointer; backdrop-filter:blur(10px);">English</button>

    <!-- Auth Screen -->
    <div id="auth-screen" class="screen">
        <div class="glass-card auth-box">
            <div style="display:flex; justify-content:center; gap:10px; margin-bottom:10px;">
                <button id="tabPromoter" class="btn" style="background:var(--am); color:white;" onclick="switchLogin('promoter')">👤 بروموتر</button>
                <button id="tabAdmin" class="btn" style="background:rgba(255,255,255,0.1); color:white;" onclick="switchLogin('admin')">👑 إدارة</button>
            </div>
            <h1 id="loginTitle" style="text-align:center; font-size: 1.8rem; margin-bottom: 20px;">تسجيل الدخول</h1>
            <p id="loginSub" style="text-align:center; margin-bottom: 20px; color: var(--tx2);">تطبيق إدارة البروموتر والمبيعات السحابي</p>
            <input type="email" id="authEmail" class="input-box" placeholder="البريد الإلكتروني">
            <input type="password" id="authPass" class="input-box" placeholder="كلمة المرور">
            
            <div>
                <button id="btnLogin" class="btn btn-primary" onclick="login()">دخول</button>
            </div>
            
            <p id="authError" style="color: var(--rd); text-align: center; margin-top: 10px; font-weight:bold; background:rgba(255,0,0,0.1); padding:5px; border-radius:5px; display:none;"></p>
        </div>
    </div>

    <!-- Main Application Screen -->
    <div id="app-screen" class="screen hidden">
        <nav class="sidebar glass-card">
            <div class="user-profile">
                <div class="avatar">👤</div>
                <div class="info">
                    <strong id="uiName">User</strong>
                    <span id="uiRole" class="badge">Role</span>
                </div>
            </div>
            
            <ul id="navLinks" class="nav-links"></ul>
            <button class="btn btn-danger" onclick="logout()" style="margin-top:auto;">خروج 🚪</button>
        </nav>

        <main class="main-content">
            <header class="topbar glass-card">
                <h2 id="pageTitle">لوحة التحكم</h2>
            </header>
            <div id="pageContent" class="page-container"></div>
        </main>
    </div>

    <!-- Loader -->
    <div id="loader" class="screen" style="z-index: 9999; background: rgba(0,0,0,0.8);">
        <div class="spinner"></div>
    </div>
</body>
</html>
